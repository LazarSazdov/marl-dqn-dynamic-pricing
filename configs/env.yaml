# Market simulation defaults. Experiment configs can override under env.

# discrete price actions, relative change to the current price
action_deltas: [-0.10, -0.05, 0.0, 0.05, 0.10]

# price bounds as ratios of the cluster median, boundary hits get logged
price_min_ratio: 0.5
price_max_ratio: 2.5

# one episode is one simulated year of nightly decisions
episode_length: 365

# rolling window in steps for the agent's own occupancy observation
occupancy_window: 7

# observations use competitor prices from the previous step to avoid the
# simultaneous action circularity
competitor_price_lag: 1

# the demand model has a lead time feature; the simulation evaluates it at
# this fixed value since it has no scrape date
reference_lead_days: 30

# reward = (price / base_price) * booked, keeps scales comparable across
# listings and avoids long all zero reward stretches wrecking the Q values
normalize_reward: true
