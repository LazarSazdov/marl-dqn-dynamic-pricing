# E2: agent count effect, D3QN with 4 agents (hypothesis H3).
experiment: E2
algorithm: dqn
n_agents: 4
n_seeds: 20
seed_base: 42
total_steps: 500000

market:
  neighbourhood: Westminster
  room_type: "Entire home/apt"

env: {}

inflation:
  enabled: false
  annual_rate: 0.0

dqn:
  gamma: 0.95
  lr: 0.0005
  batch_size: 256
  buffer_size: 100000
  learning_starts: 1000
  train_every: 1
  target_update_every: 500
  epsilon_start: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.995
  hidden_dim: 128
  dueling: true
  double: true
  bc_pretrain: true

logging:
  checkpoint_every_episodes: 100
