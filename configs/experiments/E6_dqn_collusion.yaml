# E6: ablation of E1 with collusion friendly settings, per Calvano et al.:
# longer horizon (gamma), exploration decaying to near zero, and a short
# replay buffer so targets track the current rival. Everything else is E1.
experiment: E6
algorithm: dqn
n_agents: 2
n_seeds: 20
seed_base: 42
total_steps: 500000

market:
  neighbourhood: Westminster
  room_type: "Entire home/apt"

env: {}   # inherits configs/env.yaml defaults

inflation:
  enabled: false
  annual_rate: 0.0

dqn:
  gamma: 0.99
  lr: 0.0005
  batch_size: 256
  buffer_size: 20000
  learning_starts: 1000
  train_every: 1
  target_update_every: 500
  epsilon_start: 1.0
  epsilon_min: 0.01
  epsilon_decay: 0.995        # multiplicative, per episode
  hidden_dim: 128
  dueling: true
  double: true
  bc_pretrain: true

logging:
  checkpoint_every_episodes: 100
