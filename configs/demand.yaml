# Demand model config: P(booking | price, context).

# Chronological split by stay date, within each snapshot pair.
split:
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15

# Unweighted BCE keeps probabilities calibrated, which matters more here
# than recall since the simulation consumes the probabilities directly.
# Set strategy to pos_weight to reweight positives instead.
imbalance:
  strategy: none
  pos_weight_cap: 10.0

logistic_regression:
  C: 1.0
  max_iter: 2000
  class_weight: null

# Diagnostic baseline, sets the discrimination ceiling for the feature set.
lightgbm:
  num_leaves: 63
  learning_rate: 0.05
  n_estimators: 500
  early_stopping_rounds: 50

# Widened after the first run underfit (PR-AUC 0.084 vs 0.258 for lightgbm).
mlp:
  hidden_dims: [256, 128, 64]
  dropout: 0.15
  batch_norm: true
  lr: 0.002
  weight_decay: 0.00001
  batch_size: 8192
  max_epochs: 120
  early_stopping_patience: 12

# Isotonic recalibration on the val split if calibration error is too high.
calibration:
  method: isotonic
  apply_if_ece_above: 0.03

# Simulation side elasticity fix. Cross sectional prices understate the
# causal price response. If the raw revenue curve (ratio times P) peaks
# outside [min_revenue_peak_ratio, max_revenue_peak_ratio], the artifact
# gets a beta chosen so the corrected curve P(r) * exp(beta * (r - 1)) has
# its revenue peak at target_peak_ratio. The exp form makes elasticity grow
# with price like in logit demand, so the peak is a real interior optimum.
# A peak near 1 matches hosts already pricing close to their own revenue
# optimum, which is where observed prices sit.
elasticity:
  target_peak_ratio: 1.15
  min_revenue_peak_ratio: 0.7
  max_revenue_peak_ratio: 2.0

# Gates that must pass before the model is used as the RL world model.
gates:
  min_pr_auc_over_prevalence: 1.5
  monotonic_price_check: true
  interior_revenue_peak: true
